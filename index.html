<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Yılan Oyunu</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 8px; }
  #score { font-size: 20px; margin-bottom: 10px; }
  canvas { background: #16213e; border: 4px solid #0f3460; border-radius: 8px; }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; flex-direction: column;
  }
  #overlay.show { display: flex; }
  button {
    margin-top: 16px; padding: 10px 24px; font-size: 16px;
    background: #e94560; color: white; border: none; border-radius: 6px; cursor: pointer;
  }
  button:hover { background: #ff6b81; }
  .controls { margin-top: 12px; display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; }
  .controls button { margin: 0; padding: 10px; }
  #upBtn { grid-column: 2; }
  #leftBtn { grid-column: 1; grid-row: 2; }
  #downBtn { grid-column: 2; grid-row: 2; }
  #rightBtn { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
  <h1>🐍 Yılan Oyunu</h1>
  <div id="score">Xal: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <button id="upBtn">↑</button>
    <button id="leftBtn">←</button>
    <button id="downBtn">↓</button>
    <button id="rightBtn">→</button>
  </div>
  <div id="overlay">
    <h2 id="overlayText">Oyun bitdi!</h2>
    <button id="restartBtn">Yenidən başla</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
const cols = canvas.width / box;
const rows = canvas.height / box;
let snake, direction, nextDirection, food, score, gameLoop;

function randomCell() {
  return { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
}
function placeFood() {
  let f;
  do { f = randomCell(); } while (snake.some(s => s.x === f.x && s.y === f.y));
  return f;
}
function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  direction = 'RIGHT'; nextDirection = 'RIGHT';
  food = placeFood(); score = 0;
  document.getElementById('score').textContent = 'Xal: 0';
  document.getElementById('overlay').classList.remove('show');
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, 200);
}
function tick() {
  direction = nextDirection;
  const head = {...snake[0]};
  if (direction === 'UP') head.y--;
  if (direction === 'DOWN') head.y++;
  if (direction === 'LEFT') head.x--;
  if (direction === 'RIGHT') head.x++;
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) return endGame();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = 'Xal: ' + score;
    food = placeFood();
  } else { snake.pop(); }
  draw();
}
function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x*box+box/2, food.y*box+box/2, box/2-2, 0, Math.PI*2);
  ctx.fill();
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#53d769' : '#3aa856';
    ctx.fillRect(s.x*box+1, s.y*box+1, box-2, box-2);
  });
}
function endGame() {
  clearInterval(gameLoop);
  document.getElementById('overlayText').textContent = `Oyun bitdi! Xal: ${score}`;
  document.getElementById('overlay').classList.add('show');
}
function setDirection(dir) {
  const opp = {UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT'};
  if (opp[dir] !== direction) nextDirection = dir;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') setDirection('UP');
  if (e.key === 'ArrowDown') setDirection('DOWN');
  if (e.key === 'ArrowLeft') setDirection('LEFT');
  if (e.key === 'ArrowRight') setDirection('RIGHT');
});
document.getElementById('upBtn').onclick = () => setDirection('UP');
document.getElementById('downBtn').onclick = () => setDirection('DOWN');
document.getElementById('leftBtn').onclick = () => setDirection('LEFT');
document.getElementById('rightBtn').onclick = () => setDirection('RIGHT');
document.getElementById('restartBtn').onclick = init;
init();
</script>
</body>
</html>
